apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-rotator
  labels: {app: proxy-rotator}
spec:
  replicas: 1
  selector:
    matchLabels: {app: proxy-rotator}
  template:
    metadata:
      labels: {app: proxy-rotator}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: proxy-rotator
          image: jadewon/proxy-rotator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: proxy, containerPort: 3128}
            - {name: admin, containerPort: 8080}
          env:
            - {name: TEST_URL, value: "https://example.com"}  # use your real target URL
            - {name: SOURCES, value: "freeproxy"}
            - {name: POOL_MIN, value: "5"}
            - {name: POOL_MAX, value: "50"}
            - {name: MAX_RETRIES, value: "2"}
            - {name: LOG_LEVEL, value: "info"}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 200m, memory: 128Mi}
          startupProbe:
            httpGet: {path: /startupz, port: admin}
            periodSeconds: 5
            failureThreshold: 24   # up to 120s for first proxies to arrive
          livenessProbe:
            httpGet: {path: /livez, port: admin}
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /readyz, port: admin}
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-rotator
spec:
  selector: {app: proxy-rotator}
  ports:
    - {name: proxy, port: 3128, targetPort: proxy}
    - {name: admin, port: 8080, targetPort: admin}
